services:
  dts-backend:
    build: ./backend
    command: npm run dev
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=development
      - DB_PATH=/app/data/data.db
      - RESEND_API_KEY=${RESEND_API_KEY}
      - JWT_SECRET=${JWT_SECRET:-dev-secret-key}
      - FROM_EMAIL=${FROM_EMAIL:-noreply@drugansdrums.com}
      - FRONTEND_URL=http://localhost:5173
    volumes:
      - ./backend/src:/app/src
      - app-data-dev:/app/data
    restart: unless-stopped

  dts-frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://dts-backend:3001
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    depends_on:
      - dts-backend

networks:
  default:
    name: dts-dev-internal

volumes:
  app-data-dev:
    name: dts-app-data-dev
  frontend-node-modules:
    name: dts-frontend-node-modules
