services:
  backend:
    build: ./backend
    expose:
      - "3001"
    environment:
      - PORT=3001
      - NODE_ENV=production
      - DB_PATH=/app/data/data.db
      - RESEND_API_KEY=${RESEND_API_KEY}
      - AUTH_JWKS_URL=${AUTH_JWKS_URL:-https://auth.drugansdrums.com/.well-known/jwks.json}
      - AUTH_ISSUER=${AUTH_ISSUER:-https://auth.drugansdrums.com}
      - AUTH_COOKIE_NAME=${AUTH_COOKIE_NAME:-brew_token}
      - FROM_EMAIL=${FROM_EMAIL:-noreply@drugansdrums.com}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
    volumes:
      - app-data:/app/data
    networks:
      - internal
    restart: unless-stopped

  frontend:
    build: ./frontend
    expose:
      - "80"
    networks:
      - internal
    depends_on:
      - backend
    restart: unless-stopped

networks:
  internal:

volumes:
  app-data:
    name: dts-app-data
